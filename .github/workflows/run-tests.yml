name: PAGE to ALTO test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: page-to-alto-server
      UPLOAD_KEY: gh-actions-upload-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --build-arg USER_ID=1000 \
            --build-arg GROUP_ID=1000 \
            -t "${IMAGE_NAME}" .

      - name: CLI smoke test (PAGE 2013 -> 2019 -> ALTO)
        run: |
          docker run --rm \
            "${IMAGE_NAME}" \
            bash -lc "/var/www/tests/test-page-to-alto.sh"

      - name: Start PHP server container
        run: |
          docker run -d --rm \
            --name page2alto_http \
            -e ENVIRONMENT=ci \
            -e UPLOAD_KEY="${UPLOAD_KEY}" \
            -p 8000:8000 \
            "${IMAGE_NAME}"

      - name: Wait for server to be ready
        run: |
          for i in {1..20}; do
            if curl -sSf http://localhost:8000/health.txt > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 1
          done
          echo "Server did not start in time"
          exit 1

      - name: HTTP POST test (PRImA v2019)
        run: |
          docker exec \
            -e UPLOAD_KEY="${UPLOAD_KEY}" \
            page2alto_http \
            bash -lc "/var/www/tests/http-page-upload-test.sh /var/www/tests/page-2019-sample.xml"

      - name: HTTP POST test (Transkribus)
        run: |
          docker exec \
            -e UPLOAD_KEY="${UPLOAD_KEY}" \
            page2alto_http \
            bash -lc "/var/www/tests/http-page-upload-test.sh /var/www/tests/transkribus-page-2013-sample.xml"

      - name: Stop PHP server container
        if: always()
        run: docker stop page2alto_http || true
